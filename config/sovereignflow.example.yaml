server:
  host: 127.0.0.1
  port: 8000
  threads: 8

postgresql:
  connection_url_env: POSTGRES_URL
  timeout_seconds: 5

admin:
  api_key_env: SOVEREIGNFLOW_ADMIN_API_KEY

identity_provider:
  issuer: https://identity.example.test
  audience: sovereignflow
  jwks_url: https://identity.example.test/.well-known/jwks.json
  algorithms: [RS256]
  timeout_seconds: 5
  cache_ttl_seconds: 300
  tenant_claim: tenant_id
  roles_claim: roles
  groups_claim: groups
  acl_claim: acl_labels
  classification_claim: max_classification_level
  external_model_claim: allow_external_model
  diagnostic_claim: sovereignflow_diagnostics

web_client:
  client_id: sovereignflow-web-client
  authorization_url: http://127.0.0.1:28090/realms/sovereignflow/protocol/openid-connect/auth
  token_url: http://127.0.0.1:28090/realms/sovereignflow/protocol/openid-connect/token
  logout_url: http://127.0.0.1:28090/realms/sovereignflow/protocol/openid-connect/logout

selected_model: local-default
models:
  - name: local-default
    scope: local
    base_url: http://127.0.0.1:8080/v1
    model: your-local-model
    timeout_seconds: 120
    input_cost_per_million: 0
    output_cost_per_million: 0
  # - name: openai
  #   scope: external
  #   base_url: https://api.openai.com/v1
  #   model: your-openai-model
  #   api_key_env: OPENAI_API_KEY
  #   timeout_seconds: 120
  #   input_cost_per_million: 0
  #   output_cost_per_million: 0

embeddings:
  name: local-embeddings
  base_url: http://127.0.0.1:8082/v1
  model: your-embedding-model
  timeout_seconds: 30

weaviate:
  host: 127.0.0.1
  http_port: 18080
  grpc_port: 15005
  secure: false
  api_key_env: WEAVIATE_API_KEY

prompts_root: ../prompts/general
pipelines_root: ../pipelines
domains:
  - domains/general.yaml
