services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sovereignflow
      POSTGRES_USER: sovereignflow
      POSTGRES_PASSWORD: ${SF_POSTGRES_PASSWORD:?SF_POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${SOVEREIGNFLOW_POSTGRES_PORT:-15432}:5432"
    volumes:
      - sovereignflow_postgres:/var/lib/postgresql/data
      - ./infra/postgres/init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sovereignflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.29.1
    command: ["--host", "0.0.0.0", "--port", "8080", "--scheme", "http"]
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${SF_WEAVIATE_API_KEY:?SF_WEAVIATE_API_KEY is required}
      AUTHENTICATION_APIKEY_USERS: sovereignflow
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: sovereignflow
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "sovereignflow-node"
    ports:
      - "127.0.0.1:${SOVEREIGNFLOW_WEAVIATE_HTTP_PORT:-18080}:8080"
      - "127.0.0.1:${SOVEREIGNFLOW_WEAVIATE_GRPC_PORT:-15005}:50051"
    volumes:
      - sovereignflow_weaviate:/var/lib/weaviate

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    profiles: ["identity"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${SF_KEYCLOAK_ADMIN_PASSWORD:?SF_KEYCLOAK_ADMIN_PASSWORD is required}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: sovereignflow
      KC_DB_PASSWORD: ${SF_POSTGRES_PASSWORD:?SF_POSTGRES_PASSWORD is required}
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME: ${SF_KC_HOSTNAME:?SF_KC_HOSTNAME is required}
    command:
      - start-dev
      - --import-realm
      - --http-port=8080
      - --hostname-strict=false
    ports:
      - "127.0.0.1:${SOVEREIGNFLOW_KEYCLOAK_PORT:-28090}:8080"
    volumes:
      - ./infra/keycloak/sovereignflow-realm.json:/opt/keycloak/data/import/sovereignflow-realm.json:ro

volumes:
  sovereignflow_postgres:
  sovereignflow_weaviate:
