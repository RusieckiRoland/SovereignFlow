services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sovereignflow}
      POSTGRES_USER: ${POSTGRES_USER:-sovereignflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - sovereignflow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sovereignflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.29.1
    command: ["--host", "0.0.0.0", "--port", "8080", "--scheme", "http"]
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      CLUSTER_HOSTNAME: "sovereignflow-node"
    ports:
      - "127.0.0.1:18080:8080"
      - "127.0.0.1:15005:50051"
    volumes:
      - sovereignflow_weaviate:/var/lib/weaviate

volumes:
  sovereignflow_postgres:
  sovereignflow_weaviate:

